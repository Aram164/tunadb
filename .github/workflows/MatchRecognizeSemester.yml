name: MATCH_RECOGNIZE Semester CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  match-recognize-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build debug unittest binary
        run: GEN=ninja DISABLE_SANITIZER=1 make debug

      - name: Run MATCH_RECOGNIZE SQL tests
        run: |
          build/debug/test/unittest "test/sql/match_recognize/nfa.test"
          build/debug/test/unittest "test/sql/match_recognize/prev.test"
          build/debug/test/unittest "test/sql/match_recognize/within.test"
